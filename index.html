class DCLogic {
  constructor() {
    this.props = {};
    this._handlers = {};
    this._hCtr = 0;
    this._tmpl = null;
    this._root = null;
  }

  _mount(tmpl, root) {
    this._tmpl = tmpl;
    this._root = root;
    this._render();
  }

  setState(updater) {
    const next = typeof updater === 'function' ? updater(this.state) : updater;
    this.state = { ...this.state, ...next };
    this._render();
  }

  _render() {
    this._handlers = {};
    this._hCtr = 0;
    try {
      const vals = this.renderVals();
      const html = this._process(this._tmpl, vals, {});
      this._root.innerHTML = html;
      this._root.querySelectorAll('[data-dc-click]').forEach(el => {
        const id = el.getAttribute('data-dc-click');
        el.removeAttribute('data-dc-click');
        if (this._handlers[id]) el.addEventListener('click', this._handlers[id]);
      });
    } catch(e) {
      this._root.innerHTML = '<pre style="color:red;padding:20px">' + e.stack + '</pre>';
    }
  }

  _process(html, vals, scope) {
    html = html.replace(
      /<sc-for\s+list="([^"]*)"\s+as="(\w+)"[^>]*>([\s\S]*?)<\/sc-for>/g,
      (_, listExpr, alias, inner) => {
        const list = this._lookup(listExpr, vals, scope);
        if (!Array.isArray(list)) return '';
        return list.map(item => {
          return this._process(inner, vals, { ...scope, [alias]: item });
        }).join('');
      }
    );

    html = html.replace(
      /<sc-if\s+value="([^"]*)">([\s\S]*?)<\/sc-if>/g,
      (_, expr, inner) => this._lookup(expr, vals, scope) ? inner : ''
    );

    html = html.replace(/onClick="(\{\{[^}]+\}\})"/g, (_, expr) => {
      const fn = this._lookup(expr, vals, scope);
      if (typeof fn === 'function') {
        const id = 'h' + (++this._hCtr);
        this._handlers[id] = fn;
        return `data-dc-click="${id}"`;
      }
      return '';
    });

    html = html.replace(/\{\{([^}]+)\}\}/g, (_, expr) => {
      const v = this._lookup(expr.trim(), vals, scope);
      if (v == null || typeof v === 'function' || typeof v === 'object') return '';
      return String(v);
    });

    return html;
  }

  _lookup(expr, vals, scope) {
    const path = expr.replace(/^\s*\{\{|\}\}\s*$/g, '').trim();
    const ctx = { ...vals, ...scope };
    return path.split('.').reduce((v, k) => (v == null ? undefined : v[k]), ctx);
  }
}


class Component extends DCLogic {
  state = { openFaq: 0 };

  renderVals() {
    const palette = this.props.palette ?? ["#F3F0E3", "#E7E4D0", "#262A1D", "#6E7F52", "#AD7248"];
    const [bg, bgAlt, text, accent, accent2] = palette;

    const photoTone = this.props.photoTone ?? "натуральный цвет";
    const photoFilter = photoTone === "тёплый дуотон"
      ? "sepia(0.35) hue-rotate(-10deg) saturate(1.25) contrast(1.05)"
      : "none";

    const topicCards = [
      { title: "Постоянно тревожусь", text: "Фоновое беспокойство не отпускает. Сложно расслабиться и почувствовать спокойствие.", icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 4 18 3-9h6"/></svg>' },
      { title: "Нет сил", text: "Работа, заботы и люди отнимают всё больше энергии. То, что раньше радовало, больше не вдохновляет.", icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="18" height="12" rx="2"/><path d="M22 10v4"/><path d="M6 10v4" opacity="0.3"/></svg>' },
      { title: "Не понимаю, чего хочу", text: "Сложно услышать себя и понять, куда двигаться дальше.", icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16.2 7.8l-2 6.3-6.4 2.1 2-6.3z"/></svg>' },
      { title: "Сложно в отношениях", text: "Трудно говорить о своих чувствах, отстаивать границы или чувствовать, что вас действительно понимают.", icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87" opacity="0.5"/><path d="M16 3.13a4 4 0 0 1 0 7.75" opacity="0.5"/></svg>' },
      { title: "Переживаю большие перемены", text: "Развод, переезд, смена работы или другие важные события могут лишить привычной опоры.", icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M12 2v1"/></svg>' },
      { title: "Хожу по кругу", text: "Одни и те же ситуации повторяются снова и снова. Хочется жить по-другому, но пока непонятно как.", icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><polyline points="21 3 21 9 15 9"/></svg>' }
    ];

    const eduItems = [
      { role: "Магистр психологии", place: "Московский институт психоанализа, специализация консультативная психология" },
      { role: "Гештальт-терапевт", place: "МГИ, оконченная 1-я ступень, 2-я в процессе" },
      { role: "Соматика отношений", place: "Somatic Relating, телесно-ориентированный подход" },
      { role: "Эннеаграмма: Практик и Мастер", place: "Vektor Rosta (ICTA)" }
    ];

    const faqData = [
      { q: "Я никогда не был у психолога. Как проходит первая встреча?", a: "Первая встреча — это не страшно и ни к чему не обязывает. Мы просто познакомимся, вы расскажете о своем запросе, я расскажу, как работаю и мы посмотрим, хочется ли двигаться дальше." },
      { q: "Я не знаю чего хочу от терапии. Это нормально?", a: "Да, абсолютно. Многие приходят именно с этим — с ощущением что что-то не так, но непонятно что именно. Это и есть хорошее начало." },
      { q: "А вдруг вы мне не подойдёте?", a: "Так тоже может быть, и это нормально. Первая встреча во многом про это — почувствовать, комфортно ли вам со мной. Если нет — это нормально, терапевт должен быть своим человеком." },
      { q: "Как я пойму, что терапия работает?", a: "Иногда правда бывает сложно оценить, работает ли терапия. Но обычно появляется чуть больше ясности о себе, чуть легче переносить то, что раньше было невыносимо, постепенно — ощущение что знаешь куда идти." },
      { q: "Как долго нужно ходить?", a: "Зависит от вас и от того, с чем пришли. Кто-то приходит с конкретной ситуацией и уходит через несколько встреч. Кто-то выбирает работать дольше и глубже. Это ваш выбор и ваш темп." },
      { q: "Что если мне станет хуже?", a: "Иногда в начале терапии поднимается что-то сложное — то, что давно лежало под поверхностью. Это не значит, что что-то пошло не так. Важно говорить об этом на сессии — это и есть наша работа." }
    ];

    const faqItems = faqData.map((item, i) => {
      const open = this.state.openFaq === i;
      return {
        q: item.q,
        a: item.a,
        open,
        sign: open ? "–" : "+",
        toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i }))
      };
    });

    return {
      bg, bgAlt, text, accent, accent2, photoFilter,
      topicCards, eduItems, faqItems
    };
  }
}


const comp = new Component();

      <a href="#format" style="font-size:14px;color:var(--muted);text-decoration:none;">Формат</a>
      <a href="#education" style="font-size:14px;color:var(--muted);text-decoration:none;">Образование</a>
      <a href="#about" style="font-size:14px;color:var(--muted);text-decoration:none;">Обо мне</a>
    </div>
    <a href="#contact" style="font-size:13.5px;font-weight:500;color:var(--bg);text-decoration:none;background:var(--accent);padding:9px 18px;border-radius:100px;white-space:nowrap;">Записаться</a>
    <button class="burger" onclick="document.querySelector('.mobile-menu').classList.toggle('open');this.classList.toggle('active')" style="display:none;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;padding:6px;z-index:201;">
      <svg width="26" height="20" viewBox="0 0 26 20" stroke="var(--text)" stroke-width="2" stroke-linecap="round"><line x1="3" y1="2" x2="23" y2="2"/><line x1="3" y1="10" x2="23" y2="10"/><line x1="3" y1="18" x2="23" y2="18"/></svg>
    </button>

  <!-- Mobile menu overlay -->
  <div class="mobile-menu" style="display:none;background:color-mix(in srgb, var(--bg) 96%, transparent);backdrop-filter:blur(18px);">

      <svg width="24" height="24" viewBox="0 0 24 24" stroke="var(--text)" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
    </button>
    <a href="#approach" onclick="document.querySelector('.mobile-menu').classList.remove('open');document.querySelector('.burger').classList.remove('active')" style="color:var(--text);font-family:'Newsreader',serif;font-size:22px;">Как работаю</a>
    <a href="#topics" onclick="document.querySelector('.mobile-menu').classList.remove('open');document.querySelector('.burger').classList.remove('active')" style="color:var(--text);font-family:'Newsreader',serif;font-size:22px;">Запросы</a>
    <a href="#format" onclick="document.querySelector('.mobile-menu').classList.remove('open');document.querySelector('.burger').classList.remove('active')" style="color:var(--text);font-family:'Newsreader',serif;font-size:22px;">Формат</a>
    <a href="#education" onclick="document.querySelector('.mobile-menu').classList.remove('open');document.querySelector('.burger').classList.remove('active')" style="color:var(--text);font-family:'Newsreader',serif;font-size:22px;">Образование</a>
    <a href="#about" onclick="document.querySelector('.mobile-menu').classList.remove('open');document.querySelector('.burger').classList.remove('active')" style="color:var(--text);font-family:'Newsreader',serif;font-size:22px;">Обо мне</a>
    <a href="#contact" onclick="document.querySelector('.mobile-menu').classList.remove('open');document.querySelector('.burger').classList.remove('active')" style="font-weight:500;color:var(--bg);text-decoration:none;background:var(--accent);padding:12px 28px;border-radius:100px;font-size:16px;margin-top:12px;">Записаться</a>
  </div>

  <!-- HERO -->
  <section id="hero" style="max-width:1220px;margin:0 auto;padding:clamp(48px,8vw,96px) clamp(20px,5vw,40px) 40px;display:grid;grid-template-columns:1.05fr 0.95fr;gap:clamp(32px,5vw,64px);align-items:center;position:relative;z-index:1;">

      <path d="M40,5 Q15,25 20,55 Q25,80 40,95 Q55,80 60,55 Q65,25 40,5Z" fill="var(--accent)" stroke="var(--accent)" stroke-width="0.5"/>
      <path d="M40,15 Q40,50 40,90" stroke="var(--bg)" stroke-width="0.8" fill="none" opacity="0.5"/>
      <path d="M40,35 Q30,30 24,38" stroke="var(--bg)" stroke-width="0.5" fill="none" opacity="0.4"/>
      <path d="M40,50 Q50,45 55,52" stroke="var(--bg)" stroke-width="0.5" fill="none" opacity="0.4"/>
      <path d="M40,65 Q32,60 27,67" stroke="var(--bg)" stroke-width="0.5" fill="none" opacity="0.4"/>

    <div>
      <div style="font-size:13.5px;letter-spacing:0.06em;color:var(--accent);font-weight:500;margin-bottom:20px;">Психолог-консультант &middot; Гештальт-подход</div>
      <h1 style="font-family:'Newsreader',serif;font-weight:500;font-size:clamp(38px,4.6vw,58px);line-height:1.08;margin:0 0 18px;color:var(--text);">Антонина Морозова</h1>

      <div style="display:flex;gap:14px;flex-wrap:wrap;">
        <a href="https://t.me/tonya_tut" target="_blank" style="font-size:15px;font-weight:500;color:var(--bg);background:var(--text);padding:14px 26px;border-radius:100px;text-decoration:none;">Записаться на встречу</a>
        <a href="#approach" style="font-size:15px;font-weight:500;color:var(--text);background:transparent;border:1px solid var(--border);padding:13px 25px;border-radius:100px;text-decoration:none;">Узнать больше</a>
      </div>

      <ellipse cx="218" cy="10" rx="8" ry="5" fill="var(--accent)" opacity="0.25" transform="rotate(30 218 10)"/>
      <path d="M380,30 Q375,42 365,48" stroke="var(--accent)" stroke-width="1" fill="none" stroke-linecap="round"/>
      <ellipse cx="362" cy="50" rx="8" ry="5" fill="var(--accent)" opacity="0.25" transform="rotate(30 362 50)"/>
      <path d="M400,30 Q405,42 415,48" stroke="var(--accent)" stroke-width="1" fill="none" stroke-linecap="round"/>

      <p style="font-size:16px;line-height:1.8;color:var(--muted);margin:0;">Я верю, что задача терапевта — создать пространство, в котором человек сможет лучше услышать себя, найти собственные опоры и прийти к тем изменениям, которые действительно важны именно для него. Я не даю советов и не оцениваю — вместо этого помогаю замечать то, что раньше оставалось незамеченным. В нашей работе мы будем обращать внимание не только на мысли и чувства, но и на тело: оно часто хранит важные сигналы и становится проводником к более глубокому пониманию себя.</p>

  <!-- ОБО МНЕ -->
  <section id="about" style="max-width:1220px;margin:0 auto;padding:clamp(56px,7vw,88px) clamp(20px,5vw,40px);">
    <div style="display:grid;grid-template-columns:0.85fr 1.15fr;gap:clamp(36px,5vw,64px);align-items:start;">
      <img src="forest-path.jpg" alt="" style="width:100%;height:clamp(380px,40vw,560px);object-fit:cover;border-radius:22px;filter:var(--photo-filter);display:block;position:sticky;top:110px;">

        <h2 style="font-family:'Newsreader',serif;font-weight:500;font-size:clamp(28px,3.2vw,38px);margin:0 0 26px;color:var(--text);">Обо мне</h2>
        <p style="font-size:16px;line-height:1.8;color:var(--muted);margin:0 0 20px;">Я на своём опыте знаю, как личная терапия может изменить жизнь — сделать её более наполненной и по-настоящему своей.</p>
        <p style="font-size:16px;line-height:1.8;color:var(--muted);margin:0 0 20px;">Долгое время мне было трудно понять, чего я хочу. Я смотрела на людей, которые легко ставили цели и шли к ним, и не понимала, почему у меня так не получается. Казалось, что я просто плыву по течению — а внутри жило ощущение, что я живу на каких-то 5% от возможного, а остальное скрыто в тумане.</p>
        <p style="font-size:16px;line-height:1.8;color:var(--muted);margin:0 0 20px;">Мне всегда хотелось жить осмысленнее. Я прошла через випассаны, обучение йоге, множество практик в поисках себя — но именно личная терапия стала тем, что сдвинуло меня с мёртвой точки. Постепенно тот процент жизни внутри начал расти.</p>
        <p style="font-size:16px;line-height:1.8;color:var(--muted);margin:0 0 20px;">Не сразу я решилась пойти учиться на терапевта — долго не позволяла себе заметить, как сильно меня зажигает видеть, как свет и жизнь возвращаются не только ко мне, но и к другим людям рядом. Когда решилась — уже не сворачивала. Гештальт оказался на удивление близок моей внутренней философии.</p>
        <p style="font-size:16px;line-height:1.8;color:var(--muted);margin:0;">Сейчас я работаю с людьми, которые хотят лучше понимать себя — свои чувства, желания, путь. В работе я обращаю внимание не только на мысли, но и на тело — там часто хранится самое важное.</p>
